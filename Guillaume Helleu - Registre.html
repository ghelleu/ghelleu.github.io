document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ight:1}\n.lentry.open .lrow2{background:var(--panel)}\n.lentry.open .c-chev{color:var(--accent)}\n.lrow2.static{cursor:default}\n.lrow2.static:hover{background:transparent}\n.c-chev a{color:var(--ink);border-bottom:1px solid var(--accent);padding-bottom:1px}\n.c-chev a:hover{background:var(--accent);color:var(--bg)}\n.ldesc{display:grid;grid-template-columns:46px 1fr;gap:16px;padding:0 12px 18px;animation:fadein .25s ease}\n@keyframes fadein{from{opacity:0}to{opacity:1}}\n.ldesc .d-body{grid-column:2;max-width:82ch;font-size:11.5px;line-height:1.75;color:var(--ink);opacity:.82}\n.ldesc .d-meta{grid-column:2;margin-top:10px;font-size:9px;letter-spacing:.12em;text-transform:uppercase;\n  color:var(--dimmer);display:flex;gap:8px 18px;flex-wrap:wrap;align-items:center}\n.ldesc .d-meta b{color:var(--dim);font-weight:400}\n.ldesc .d-meta a{color:var(--ink);border-bottom:1px solid var(--accent);padding-bottom:1px}\n.ldesc .d-meta a:hover{background:var(--accent);color:var(--bg)}\n.ledger-foot{display:flex;justify-content:space-between;align-items:baseline;padding:12px 12px 0;\n  font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}\n.ledger-foot .reset{background:transparent;border:none;color:var(--dim);cursor:pointer;font-family:var(--mono);\n  font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;border-bottom:1px solid var(--line)}\n.ledger-foot .reset:hover{color:var(--ink)}\n@media(max-width:1000px){\n  .lgrid{grid-template-columns:44px 104px 1fr 96px 30px}\n  .c-struct{display:none}\n}\n@media(max-width:680px){\n  .lgrid{grid-template-columns:38px 1fr 72px 28px}\n  .c-type{display:none}\n  .ldesc{grid-template-columns:1fr;padding:0 12px 16px}\n  .ldesc .d-body,.ldesc .d-meta{grid-column:1}\n}\n\n/* ---------- section (index) pages ---------- */\n.pagehead{max-width:1280px;margin:0 auto;padding:120px 0 6px}\n.pagehead .crumb{display:flex;justify-content:space-between;font-size:10px;letter-spacing:.18em;text-transform:uppercase;\n  color:var(--dim);border-top:1px solid var(--line);padding-top:12px}\n.pagehead .crumb .r{color:var(--accent)}\n.pagehead h1{font-family:var(--disp);font-weight:300;font-size:clamp(56px,13vw,150px);line-height:.86;\n  letter-spacing:.01em;margin:22px 0 14px;text-transform:uppercase}\n.pagehead .lead{font-size:12px;letter-spacing:.02em;color:var(--dim);max-width:60ch;line-height:1.8}\n.cards{max-width:1280px;margin:0 auto;padding:30px 0 40px;border:none}\n.cardset{border:1px solid var(--line)}\n.card{display:grid;grid-template-columns:88px 1fr 168px;gap:26px;padding:28px 24px;border-bottom:1px solid var(--line);transition:background .15s;position:relative}\n.card:last-child{border-bottom:none}\n.card:hover{background:var(--panel)}\n.card .cref{font-size:11px;color:var(--accent)}\n.card .cbody{max-width:72ch}\n.card .cbody h3{font-family:var(--mono);font-weight:500;font-size:17px;letter-spacing:.03em;text-transform:uppercase;margin-bottom:8px}\n.card .cbody .csub{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);margin-bottom:13px}\n.card .cbody p{font-size:12.5px;line-height:1.75}\n.card .cmeta{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);text-align:right;line-height:1.9}\n.card .cmeta .go{display:inline-block;margin-top:12px;color:var(--ink);border-bottom:1px solid var(--accent)}\n.card .cmeta .go:hover{background:var(--accent);color:var(--bg)}\n.card .cmeta .go::after{content:\"\";position:absolute;inset:0}\n.card:hover .cmeta .go{background:var(--accent);color:var(--bg)}\n.card .cmeta .off{color:var(--dimmer);display:inline-block;margin-top:12px}\n@media(max-width:720px){.card{grid-template-columns:1fr;gap:12px}.card .cmeta{text-align:left}}\n\n/* ---------- footer ---------- */\n.foot{max-width:720px;margin:0 auto;padding:50px 20px 60px;text-align:center;border-top:1px solid var(--line)}\n.foot .stamp{font-size:11px;letter-spacing:.14em;text-transform:uppercase;line-height:2.1;color:var(--ink)}\n.foot .stamp .pill{border:1px solid var(--ink);border-radius:20px;padding:2px 12px;white-space:nowrap}\n.foot .mk{margin:16px auto;width:26px;height:26px;color:var(--ink)}\n.foot .cred{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin-top:14px;line-height:1.9}\n.foot .cred a:hover{color:var(--ink)}\n<\u002Fstyle>\n<script>(function(){try{var t=localStorage.getItem('gh-theme');if(t!=='night'&&t!=='day')t='day';document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','day');}})();<\u002Fscript>\n<\u002Fhelmet>\n\n<div>\n\n<header class=\"top\">\n  <span class=\"ident\">GUILLAUME <b>HELLEU®<\u002Fb><\u002Fspan>\n  <nav class=\"nav\">\n    <a href=\"index.dc.html\" data-on=\"1\">Home<\u002Fa>\n    <a href=\"research.dc.html\">Research<\u002Fa>\n    <a href=\"pedagogy.dc.html\">Pedagogy<\u002Fa>\n    <a href=\"practice.dc.html\">Practice<\u002Fa>\n    <button class=\"tog\" onclick=\"{{ toggleTheme }}\" title=\"Day / Night\"><span class=\"sw\"><\u002Fspan>{{ themeLabel }}<\u002Fbutton>\n  <\u002Fnav>\n<\u002Fheader>\n\n<main>\n\n<section class=\"hero3\">\n  <div class=\"cluster rise\">\n    <div class=\"marks5\">\n      <svg viewBox=\"0 0 40 40\"><circle cx=\"15\" cy=\"20\" r=\"11\"><\u002Fcircle><circle cx=\"25\" cy=\"20\" r=\"11\"><\u002Fcircle><\u002Fsvg>\n      <svg viewBox=\"0 0 40 40\"><circle cx=\"20\" cy=\"20\" r=\"12\"><\u002Fcircle><path d=\"M20 3v34M3 20h34\"><\u002Fpath><\u002Fsvg>\n      <svg viewBox=\"0 0 40 40\"><path d=\"M20 6v28M8 13l24 14M32 13L8 27\"><\u002Fpath><\u002Fsvg>\n      <svg viewBox=\"0 0 40 40\"><path d=\"M11 7v26M29 7v26M11 20h18\"><\u002Fpath><\u002Fsvg>\n      <svg viewBox=\"0 0 40 40\"><rect x=\"7\" y=\"7\" width=\"26\" height=\"26\"><\u002Frect><rect x=\"15\" y=\"15\" width=\"10\" height=\"10\"><\u002Frect><\u002Fsvg>\n    <\u002Fdiv>\n\n    <div class=\"identblock\">\n      <div class=\"namemark\">Guillaume Helleu®<\u002Fdiv>\n      <div class=\"line-sub\">Architecte · Enseignant-chercheur — HEAD · Genève<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"tagline3\">\n      <span>a practice navigating through<\u002Fspan>\n      <span>Digital <a href=\"research.dc.html\">Research<\u002Fa>,<\u002Fspan>\n      <span>Technological <a href=\"pedagogy.dc.html\">Pedagogy<\u002Fa><\u002Fspan>\n      <span>and Creative <a href=\"practice.dc.html\">Practice<\u002Fa>.<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"colophon\">\n      <div class=\"row\"><span>REF · <b>GH—2026<\u002Fb><\u002Fspan><span class=\"gl\"><svg viewBox=\"0 0 9 9\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1\"><path d=\"M4.5 0v9M0 4.5h9\"><\u002Fpath><\u002Fsvg><\u002Fspan><span>FIELD · <b>Design / Architecture / Récit<\u002Fb><\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span class=\"cap\">©<\u002Fspan>&nbsp;2026 — Property of Guillaume Helleu<\u002Fdiv>\n      <div class=\"row\">Geneva · <b>46.2044°N&nbsp; 6.1432°E<\u002Fb><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"scrollcue3\"><span class=\"ar\">↓<\u002Fspan> Scroll — Notice &amp; Registre<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"band\">\n  <div class=\"band-head\"><span>Notice — Présentation<\u002Fspan><span class=\"ix\">NA·01<\u002Fspan><\u002Fdiv>\n  <div class=\"notice rise\">\n    <div class=\"tags\">\n      <span class=\"t\">OBJET · <b>Pratique critique<\u002Fb><\u002Fspan>\n      <span class=\"t\">CHAMPS · <b>Design · Architecture · Récit interactif<\u002Fb><\u002Fspan>\n      <span class=\"t\">TECH · <b>IA générative · Blockchain · Métavers<\u002Fb><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"bio\">\n      <p>Guillaume Helleu est architecte de formation et enseignant-chercheur à la HEAD – Genève, où il développe une activité pédagogique et critique autour des mutations contemporaines du design et de l’architecture à l’ère des technologies émergentes (IA générative, blockchain, métavers).<\u002Fp>\n      <p>Il enseigne trois cours principaux à la HEAD : <a href=\"ped_proof-of-punk.dc.html\">Proof-of-Punk<\u002Fa>, un séminaire transdisciplinaire consacré aux imaginaires technologiques (Web3, IA, gaming) ; <a href=\"ped_architectural-latent-space.dc.html\">Architectural Latent Space<\u002Fa>, un atelier intensif sur l’image synthétique en architecture ; et <a href=\"ped_creativites-artificielles.dc.html\">Créativités artificielles<\u002Fa>, un cours transversal combinant théorie et pratique des IA génératives. Il intervient également dans deux CAS à la HEG Genève et à l’ISFB, où il accompagne des professionnels sur les mutations liées à la blockchain.<\u002Fp>\n      <p>Il a participé à plusieurs projets de recherche, notamment <a href=\"https://cryptokit.ch\" target=\"_blank\" rel=\"noopener\">Cryptokit.ch<\u002Fa>, une cartographie sémantique des technologies Web3, et <a href=\"https://www.instagram.com/play___to___learn/?hl=en\" target=\"_blank\" rel=\"noopener\">Play-to-Learn<\u002Fa>, un programme explorant les ponts entre sciences humaines et jeux vidéo.<\u002Fp>\n      <p>Ses recherches croisent expérimentation visuelle, analyse critique et production éditoriale. Il est l’auteur de <a href=\"https://www.hesge.ch/head/projet/manuel-dautomatisation\" target=\"_blank\" rel=\"noopener\">Exercices de création artificielle<\u002Fa> ; co-auteur de <a href=\"res_total_record.dc.html\">Total Record<\u002Fa>, sur les protocoles blockchain face au post-capitalisme ; et de <a href=\"res_singulariser-le-multiple.dc.html\">Singulariser le multiple<\u002Fa>, un essai sur les formes d’unicité dans les environnements numériques.<\u002Fp>\n      <p>Enfin, il poursuit une pratique appliquée à la croisée du design narratif, de l’architecture et des technologies interactives — notamment le projet <a href=\"https://pulsations.hug.ch/article/symbiotopia-la-chasse-au-tresor-de-la-mea#gsc.tab=0\" target=\"_blank\" rel=\"noopener\">Symbiotopia<\u002Fa> pour l’hôpital des enfants des HUG, et depuis 2025 le <a href=\"https://portaildesnations.ch/\" target=\"_blank\" rel=\"noopener\">Portail des Nations<\u002Fa>, une expérience de médiation immersive autour du multilatéralisme à Genève.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"band\">\n  <div class=\"band-head\"><span>Activité — Registre complet<\u002Fspan><span class=\"ix\">NA·02<\u002Fspan><\u002Fdiv>\n\n  <sc-if value=\"{{ showFilters }}\" hint-placeholder-val=\"{{ true }}\">\n  <div class=\"filters\">\n    <div class=\"filterline\">\n      <span class=\"lab\">Type<\u002Fspan>\n      <sc-for list=\"{{ typeChips }}\" as=\"c\" hint-placeholder-count=\"7\">\n        <button class=\"chip\" data-on=\"{{ c.on }}\" onclick=\"{{ c.click }}\">{{ c.label }}<span class=\"n\">{{ c.count }}<\u002Fspan><\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div class=\"filterline\">\n      <span class=\"lab\">Année<\u002Fspan>\n      <sc-for list=\"{{ yearChips }}\" as=\"y\" hint-placeholder-count=\"13\">\n        <button class=\"chip\" data-on=\"{{ y.on }}\" onclick=\"{{ y.click }}\">{{ y.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div class=\"ledger\">\n    <div class=\"lhead lgrid\"><span class=\"c-ref\">Réf<\u002Fspan><span class=\"c-type\">Type<\u002Fspan><span class=\"c-title\">Intitulé<\u002Fspan><span class=\"c-struct\">Structure · Contexte<\u002Fspan><span class=\"c-date\">Date<\u002Fspan><span class=\"c-chev\"><\u002Fspan><\u002Fdiv>\n    <sc-if value=\"{{ loading }}\" hint-placeholder-val=\"{{ true }}\">\n      <div class=\"lrow2 lgrid\"><span><\u002Fspan><span style=\"grid-column:2/6;color:var(--dim);letter-spacing:.14em;text-transform:uppercase;font-size:10px\">Chargement du registre…<\u002Fspan><\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-for list=\"{{ rows }}\" as=\"item\" hint-placeholder-count=\"14\">\n      <div class=\"lentry {{ item.openClass }}\">\n        <sc-if value=\"{{ item.expandable }}\" hint-placeholder-val=\"{{ true }}\">\n          <button class=\"lrow2 lgrid\" onclick=\"{{ item.toggle }}\">\n            <span class=\"c-ref\">{{ item.id }}<\u002Fspan>\n            <span class=\"c-type\">{{ item.type }}<\u002Fspan>\n            <span class=\"c-title\">{{ item.title }}<\u002Fspan>\n            <span class=\"c-struct\">{{ item.struct }}<\u002Fspan>\n            <span class=\"c-date\">{{ item.date }}<\u002Fspan>\n            <span class=\"c-chev\">{{ item.sign }}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ item.static }}\" hint-placeholder-val=\"{{ false }}\">\n          <div class=\"lrow2 lgrid static\">\n            <span class=\"c-ref\">{{ item.id }}<\u002Fspan>\n            <span class=\"c-type\">{{ item.type }}<\u002Fspan>\n            <span class=\"c-title\">{{ item.title }}<\u002Fspan>\n            <span class=\"c-struct\">{{ item.struct }}<\u002Fspan>\n            <span class=\"c-date\">{{ item.date }}<\u002Fspan>\n            <span class=\"c-chev\"><sc-if value=\"{{ item.hasLink }}\" hint-placeholder-val=\"{{ true }}\"><a href=\"{{ item.href }}\" target=\"{{ item.target }}\">↗<\u002Fa><\u002Fsc-if><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ item.open }}\" hint-placeholder-val=\"{{ false }}\">\n          <div class=\"ldesc\">\n            <div class=\"d-body\">{{ item.desc }}<\u002Fdiv>\n            <div class=\"d-meta\">\n              <span><b>Structure<\u002Fb> · {{ item.struct }}<\u002Fspan>\n              <span><b>Lieu<\u002Fb> · {{ item.place }}<\u002Fspan>\n              <span><b>Année<\u002Fb> · {{ item.year }}<\u002Fspan>\n              <sc-if value=\"{{ item.hasLink }}\" hint-placeholder-val=\"{{ true }}\"><a href=\"{{ item.href }}\" target=\"{{ item.target }}\">Ouvrir ↗<\u002Fa><\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n  <div class=\"ledger-foot\">\n    <span>Affichés <span class=\"ac\">{{ shown }}<\u002Fspan> / {{ total }}<\u002Fspan>\n    <button class=\"reset\" onclick=\"{{ reset }}\">Réinitialiser<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fmain>\n\n<footer class=\"foot\">\n  <div class=\"stamp\">\n    The&nbsp; Guillaume Helleu &nbsp;Index &nbsp;is<br>\n    Researched, Taught &amp; Practised in <span class=\"pill\">Geneva · CH<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"mk\"><svg viewBox=\"0 0 26 26\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1\"><path d=\"M13 1v24M1 13h24M4.5 4.5l17 17M21.5 4.5l-17 17\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n  <div class=\"cred\">\n    © 2026 &nbsp; Property of Guillaume Helleu<br>\n    <a href=\"mailto:guillaumehelleu.pro@gmail.com\">guillaumehelleu.pro@gmail.com<\u002Fa> &nbsp;·&nbsp; <a href=\"tel:+41783085956\">+41 78 308 59 56<\u002Fa>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:900},&quot;showFilters&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Registre&quot;}}\">\nclass Component extends DCLogic {\n  state = { type:'ALL', year:'ALL', open:{} };\n  componentDidMount(){\n    this._all = window.GH_ACTIVITIES || [];\n    this._types = window.GH_TYPES || [];\n    this.forceUpdate();\n  }\n  renderVals(){\n    const theme = (typeof document!=='undefined' && document.documentElement.getAttribute('data-theme')) || 'day';\n    const toggleTheme = ()=>{ const n=theme==='night'?'day':'night'; document.documentElement.setAttribute('data-theme',n); try{localStorage.setItem('gh-theme',n);}catch(e){} this.forceUpdate(); };\n    const all = this._all || [];\n    const TYPES = this._types || [];\n    const st = this.state;\n    const match = (o)=> (st.type==='ALL'||o.code===st.type) && (st.year==='ALL'||o.year===st.year);\n    const open = st.open || {};\n    const toggle = (id)=> this.setState(s=>({ open:{...s.open, [id]: !s.open[id]} }));\n    const rows = all.filter(match).map(o=>({\n      ...o,\n      struct: o.org || '—',\n      place: o.place || '—',\n      year: o.year || '—',\n      expandable: !!(o.desc && o.desc.length>3),\n      static: !(o.desc && o.desc.length>3),\n      hasLink: !!o.href, target: o.ext?'_blank':'',\n      open: !!(o.desc && o.desc.length>3) && !!open[o.id],\n      openClass: (!!(o.desc && o.desc.length>3) && open[o.id]) ? 'open' : '',\n      sign: open[o.id] ? '–' : '+',\n      toggle: ()=>toggle(o.id)\n    }));\n    const countBy = (code)=> all.filter(o=>o.code===code).length;\n    const typeChips = [{code:'ALL',label:'Tout',count:all.length}]\n      .concat(TYPES.map(t=>({code:t.code,label:t.label,count:countBy(t.code)})))\n      .map(t=>({ key:t.code, label:t.label, count:t.count, on: st.type===t.code?'1':null, click:()=>this.setState({type:t.code}) }));\n    const years = [...new Set(all.map(o=>o.year).filter(Boolean))].sort((a,b)=>Number(b)-Number(a));\n    const yearChips = [{y:'ALL',label:'Toutes'}].concat(years.map(y=>({y,label:y})))\n      .map(o=>({ key:o.y, label:o.label, on: st.year===o.y?'1':null, click:()=>this.setState({year:o.y}) }));\n    return {\n      theme, toggleTheme, themeLabel: theme==='night'?'Night':'Day',\n      rows, typeChips, yearChips, shown: rows.length, total: all.length,\n      loading: !this._all, reset:()=>this.setState({type:'ALL',year:'ALL'}),\n      showFilters: this.props.showFilters ?? true\n    };\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
