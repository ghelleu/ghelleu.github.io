<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="assets/site.css">
<link rel="stylesheet" href="data/article.css">
<script>(function(){try{var t=localStorage.getItem('gh-theme');if(t!=='night'&&t!=='day')t='day';document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','day');}})();</script>
</helmet>

<div>
<header class="top">
  <span class="ident">GUILLAUME <b>HELLEU®</b></span>
  <nav class="nav">
    <a href="index.dc.html">Home</a>
    <a href="research.dc.html">Research</a>
    <a href="pedagogy.dc.html" data-on="1">Pedagogy</a>
    <a href="practice.dc.html">Practice</a>
    <button class="tog" onClick="{{ toggleTheme }}" title="Day / Night"><span class="sw"></span>{{ themeLabel }}</button>
  </nav>
</header>

<main>
  <sc-if value="{{ notLoaded }}" hint-placeholder-val="{{ true }}">
    <div class="article" style="color:var(--dim);letter-spacing:.14em;text-transform:uppercase;font-size:11px">Chargement…</div>
  </sc-if>
  <sc-if value="{{ loaded }}" hint-placeholder-val="{{ true }}">{{ articleEl }}</sc-if>
</main>

<footer class="foot">
  <div class="stamp">The&nbsp; Guillaume Helleu &nbsp;Index &nbsp;is<br>Researched, Taught &amp; Practised in <span class="pill">Geneva · CH</span></div>
  <div class="mk"><svg viewBox="0 0 26 26" fill="none" stroke="currentColor" stroke-width="1"><path d="M13 1v24M1 13h24M4.5 4.5l17 17M21.5 4.5l-17 17"/></svg></div>
  <div class="cred">© 2026 &nbsp; Property of Guillaume Helleu<br><a href="mailto:guillaumehelleu.pro@gmail.com">guillaumehelleu.pro@gmail.com</a> &nbsp;·&nbsp; <a href="tel:+41783085956">+41 78 308 59 56</a></div>
</footer>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  componentDidMount(){
    this.slug = 'ped_creativites-artificielles';
    import('./data/articles.js').then(m=>{ this._a = m.ARTICLES[this.slug]; this.forceUpdate(); })
      .catch(()=>{ this._a={html:'<p>Erreur de chargement.</p>'}; this.forceUpdate(); });
  }
  renderVals(){
    const theme = (typeof document!=='undefined' && document.documentElement.getAttribute('data-theme')) || 'day';
    const a = this._a;
    return {
      themeLabel: theme==='night' ? 'Night' : 'Day',
      toggleTheme: ()=>{ const n=theme==='night'?'day':'night'; document.documentElement.setAttribute('data-theme',n); try{localStorage.setItem('gh-theme',n);}catch(e){} this.forceUpdate(); },
      loaded: !!a, notLoaded: !a,
      articleEl: a ? React.createElement('article',{className:'article',dangerouslySetInnerHTML:{__html:a.html}}) : null
    };
  }
}
</script>
</body>
</html>
